<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mia Bookshelf</title>
    <link rel="stylesheet" href="./style.css">
    <script type="module" src="./script.js"></script>

</head>
<body>
    <dialog class="add-modal">
        <form id="add-book-form">

            <div class="entry">
                <label for="title">Title</label>
                <input type="text" id="title" required>
            </div>

            <div class="entry">
                <label for="author">Author</label>
                <input type="text" id="author" required>
            </div>

            <div class="entry">
                <label for="pages">Pages</label>
                <input type="number" id="pages" required>
            </div>

            <div class="entry" id="entry-read">
                <label for="radio-yes">Read</label>
                <div class="read-radio">

                    <input class="radio-yes"
                    type="radio"
                    name="book-radio"
                    id="radio-yes"
                    value="read"
                    required>

                    <input class="radio-no"
                    type="radio"
                    name="book-radio"
                    id="radio-no"
                    value="not-read">

                </div>
            </div>

            <div class="entry">
                <label for="cover-img">Upload cover</label>
                <input type="file" name="cover" id="cover-img">
            </div>

            <div class="submit-row">
                <img src="./icons/book-icon-black.svg" 
                alt=""
                width="35px">
                <button class="close-modal">Submit</button>
            </div>

        </form>
    </dialog>

    <div class="layout">
        <h1>Mia Bookshelf</h1>
        <div class="upper">
            <div class="cover"></div>
            <div class="book-info">
                <p>Title:</p>
                <p>Author:</p>
                <p>Pages:</p>
                <p>Read:</p>
            </div>
            <button class="add-book">
                <img src="./icons/add.svg" alt=""
                width="35px">
            </button>
        </div>
        
        <!-- Books will be added with Javascript -->
        <div class="bottom">
        </div>
    </div>
</body>
</html>
